<!doctype html>
<html lang="en-AU">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="default"
		/>
		<meta name="apple-mobile-web-app-title" content="Workout" />
		<meta name="theme-color" content="#dddbd9" />
		<title>workout-dashboard</title>

		<!-- Home-screen / tab icons. -->
		<link rel="apple-touch-icon" href="assets/apple-touch-icon-180.png" />
		<link rel="icon" href="assets/icon-512.svg" />

		<!-- Static PWA manifest (a real URL, so start_url/scope resolve correctly) -->
		<link rel="manifest" href="manifest.json" />

		<link
			rel="preload"
			as="font"
			type="font/woff2"
			crossorigin
			href="fonts/archivo-latin-800.woff2"
		/>
		<link rel="stylesheet" href="css/styles.css" />
	</head>
	<body>
		<!-- The whole UI is rendered into this single mount point by js/ui.js render() -->
		<div id="app"></div>

		<!-- Persistent polite live region. render() rebuilds #app wholesale, so a
		     live region inside it can never fire; this sibling survives every paint
		     and is written by doBorrow/undoBorrow to announce the swap (issue #77). -->
		<div id="sr-status" role="status" aria-live="polite" class="sr-only"></div>

		<!-- Bottom sheet for "follow a different day". Hidden until openSwapSheet() shows it. -->
		<div
			id="swap-sheet-overlay"
			style="display: none"
			class="swap-sheet-overlay"
			onclick="closeSwapSheet()"
		>
			<div
				class="swap-sheet"
				role="dialog"
				aria-modal="true"
				aria-labelledby="swap-sheet-title"
				onclick="event.stopPropagation()"
			>
				<div class="swap-sheet-header">
					<div class="swap-sheet-heading">
						<div class="swap-sheet-title" id="swap-sheet-title">
							Follow a different day's workout
						</div>
						<div class="swap-sheet-sub">
							Today's schedule is unchanged — you're just
							following this one instead
						</div>
					</div>
					<button
						class="sheet-close"
						type="button"
						onclick="closeSwapSheet()"
						aria-label="Close"
					>
						<svg
							width="18"
							height="18"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.4"
							stroke-linecap="square"
							aria-hidden="true"
						>
							<path d="M6 6l12 12M18 6L6 18" />
						</svg>
					</button>
				</div>
				<div id="swap-options"></div>
			</div>
		</div>

		<!-- Bottom sheet for the per-exercise LOG capture (#86). Hidden until
		     openLogSheet() shows it. Reuses the swap-sheet Modernist frame; the
		     body (steppers, felt-easy toggle, Save, last-3 history) is built by
		     js/ui.js. A real dialog: role="dialog" aria-modal, Escape closes,
		     focus returns to the Log chip that opened it (#74 pattern). -->
		<div
			id="log-sheet-overlay"
			style="display: none"
			class="swap-sheet-overlay"
			onclick="closeLogSheet()"
		>
			<div
				class="swap-sheet log-sheet"
				role="dialog"
				aria-modal="true"
				aria-labelledby="log-sheet-title"
				onclick="event.stopPropagation()"
			>
				<div class="swap-sheet-header">
					<div class="swap-sheet-heading">
						<div class="swap-sheet-title" id="log-sheet-title">
							Log
						</div>
						<div class="swap-sheet-sub" id="log-sheet-sub"></div>
					</div>
					<button
						class="sheet-close"
						type="button"
						onclick="closeLogSheet()"
						aria-label="Close"
					>
						<svg
							width="18"
							height="18"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.4"
							stroke-linecap="square"
							aria-hidden="true"
						>
							<path d="M6 6l12 12M18 6L6 18" />
						</svg>
					</button>
				</div>
				<div id="log-sheet-body"></div>
			</div>
		</div>

		<!--
  Scripts load in dependency order (classic scripts share one global scope):
    data    → the constants everything reads
    storage → localStorage + shared session state
    workout → pure logic that turns data into a checklist
    ui      → builds HTML and handles clicks
    main    → bootstraps: manifest, first render, service worker
-->
		<script src="js/data.js"></script>
		<script src="js/storage.js"></script>
		<script src="js/workout.js"></script>
		<script src="js/ui.js"></script>
		<script src="js/main.js"></script>
	</body>
</html>
