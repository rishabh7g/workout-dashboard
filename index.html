<style>
  :root {
    color-scheme: dark;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --text2: #999;
    --accent: #e8ff3c;
    --warn: #ff9500;
    --green: #34c759;
    --blue: #0a84ff;
    --teal: #5ac8fa;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }

  header {
    padding: calc(env(safe-area-inset-top, 20px) + 16px) 20px 16px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }

  .app-name {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text2);
  }

  .date-label {
    font-size: 13px;
    color: var(--text2);
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  .workout-title {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.2;
    margin-top: 4px;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text2);
  }

  .badge.accent {
    background: var(--accent);
    color: #0f0f0f;
  }

  .content {
    padding: 16px 20px;
    max-width: 480px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text2);
    margin: 24px 0 10px;
  }

  .exercise-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }

  .exercise-name {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.3;
  }

  .exercise-meta {
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 3px;
  }

  .exercise-note {
    font-size: 13px;
    color: var(--text2);
    margin-top: 5px;
    line-height: 1.4;
  }

  .exercise-warn {
    font-size: 12px;
    color: var(--warn);
    margin-top: 5px;
    line-height: 1.4;
  }

  .exercise-cap {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }

  .cap-value {
    color: var(--green);
    font-weight: 600;
  }

  .rest-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 36px 20px 24px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .rest-emoji { font-size: 52px; }

  .rest-title {
    font-size: 22px;
    font-weight: 700;
    margin-top: 12px;
  }

  .rest-subtitle {
    font-size: 14px;
    color: var(--text2);
    margin-top: 6px;
  }

  .recovery-list {
    text-align: left;
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 4px;
  }

  .recovery-item {
    font-size: 14px;
    color: var(--text2);
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.4;
  }

  .recovery-item:last-child { border-bottom: none; }

  .run-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid var(--border);
  }

  .run-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 14px;
  }

  .run-stat {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .run-stat-label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  .run-stat-value {
    font-size: 20px;
    font-weight: 700;
    margin-top: 3px;
    color: var(--accent);
  }

  .run-stat-unit {
    font-size: 12px;
    color: var(--text2);
    font-weight: 400;
  }

  .rugby-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .rugby-emoji { font-size: 28px; line-height: 1; padding-top: 2px; }

  .rugby-title {
    font-size: 15px;
    font-weight: 600;
  }

  .rugby-sub {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
    line-height: 1.5;
  }

  .principles-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    border: 1px solid var(--border);
  }

  .principle {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .principle:last-child { border-bottom: none; }

  .stairmaster-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stairmaster-icon { font-size: 24px; }

  .stairmaster-text {
    font-size: 14px;
    font-weight: 600;
  }

  .stairmaster-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }

  .core-card {
    background: var(--surface2);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border-left: 3px solid var(--blue);
  }

  .core-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--blue);
    margin-bottom: 8px;
  }

  .core-item {
    font-size: 14px;
    font-weight: 500;
    padding: 3px 0;
  }

  .conditioning-block {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--teal);
  }

  .conditioning-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal);
    margin-bottom: 6px;
  }

  .conditioning-item {
    font-size: 13px;
    color: var(--text);
    padding: 2px 0;
    line-height: 1.5;
  }

  .conditioning-note {
    font-size: 12px;
    color: var(--text2);
    margin-top: 5px;
    line-height: 1.4;
    font-style: italic;
  }

  .no-schedule {
    padding: 60px 20px;
    text-align: center;
  }
</style>
</head>

// ─── Helpers ────────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDate(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-AU', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function getWeekType(type, key) {
  if (['chest', 'legs-quads', 'arms-biceps'].includes(type)) return 'Front Week';
  if (['back', 'legs-hamstrings', 'arms-triceps'].includes(type)) return 'Back Week';
  if (type === 'shoulders' && key) {
    // Anchor: week starting Mon May 25, 2026 = Back Week = week 0
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const dow = date.getDay();
    const toMon = dow === 0 ? -6 : 1 - dow;
    const weekMon = new Date(y, m - 1, d + toMon);
    const anchor = new Date(2026, 4, 25);
    const weekNum = Math.round((weekMon - anchor) / 604800000);
    return weekNum % 2 === 0 ? 'Back Week' : 'Front Week';
  }
  return '';
}

function exCard(ex) {
  return `
    <div class="exercise-card">
      <div class="exercise-name">${ex.name}</div>
      <div class="exercise-meta">${ex.sets} × ${ex.reps}${ex.weight ? ' · ' + ex.weight : ''}</div>
      ${ex.note  ? `<div class="exercise-note">${ex.note}</div>` : ''}
      ${ex.cap   ? `<div class="exercise-cap">Cap: <span class="cap-value">${ex.cap}</span></div>` : ''}
      ${ex.warn  ? `<div class="exercise-warn">⚠️ ${ex.warn}</div>` : ''}
    </div>`;
}

function coreHTML(coreType) {
  const extra = coreType === 'anti-rotation'
    ? `<div class="conditioning-item" style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.08)">Pallof press · 3×12 each side</div>
       <div class="conditioning-note">Anti-rotation — stability for cutting</div>`
    : coreType === 'anti-extension'
    ? `<div class="conditioning-item" style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.08)">Dead bug · 3×10 each side</div>
       <div class="conditioning-item">Forearm side plank · 3×25 sec each</div>
       <div class="conditioning-note">Anti-extension — spinal stability</div>`
    : '';
  return `<div class="core-card">
    <div class="core-title">Core (every session)</div>
    ${CORE.map(ex => `<div class="core-item">${ex.name} ${ex.sets}×${ex.reps}${ex.note ? `<div class="exercise-note" style="margin-top:2px">${ex.note}</div>` : ''}</div>`).join('')}
    ${extra}
  </div>`;
}

    <div class="conditioning-title">Warm-up</div>
    <div class="conditioning-item">Leg swings front-back + side-side · 10 each</div>
