<script>
  const manifest = {
    name: "Dashboard",
    short_name: "Dashboard",
    start_url: ".",
    display: "standalone",
    background_color: "#0f0f0f",
    theme_color: "#0f0f0f",
    icons: [
      { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230f0f0f'/%3E%3Ctext x='256' y='340' text-anchor='middle' font-size='280' font-family='system-ui'%3E%F0%9F%92%AA%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = url;
  document.head.appendChild(link);
</script>

<style>

<div id="app">
  <div style="padding:40px;text-align:center;color:#666">Loading...</div>

<script>
// ─── Interactive state ──────────────────────────────────────────────────────
let completedItems = new Set();
let allItems = [];
let cachedKey = null;

function saveState(key) {
  try { localStorage.setItem('ws-' + key, JSON.stringify([...completedItems])); } catch(e) {}
}
function loadState(key) {
  try {
    const s = localStorage.getItem('ws-' + key);
    if (s) return new Set(JSON.parse(s));
  } catch(e) {}
  return new Set();
}

const SECTION_NAMES = {
  warmup: 'Warm-up', ex: 'Exercises', core: 'Core',
  finisher: 'Finisher', ankle: 'Ankle Stability', cardio: 'Cardio',
};

function buildItemList(workout) {
  const items = [];
  const counts = {};
  const add = (sec, label, meta, extra = {}) => {
    counts[sec] = (counts[sec] || 0) + 1;
    items.push({ id: `${sec}-${counts[sec]}`, section: sec, label, meta, ...extra });
  };

  if (workout.legConditioning) {
    add('warmup', 'Leg swings', 'Front-back + side-side · 10 each');
    add('warmup', 'Ankle circles', 'Both directions');
    add('warmup', 'Reverse lunges', '3×10 each leg');
  }

  for (const ex of workout.exercises) {
    add('ex', ex.name, `${ex.sets}×${ex.reps}${ex.weight ? ' · ' + ex.weight : ''}`,
      { note: ex.note, cap: ex.cap, warn: ex.warn });
  }

  if (workout.hasCore) {
    for (const ex of CORE) {
      add('core', ex.name, `${ex.sets}×${ex.reps}`, { note: ex.note });
    }
    if (workout.coreType === 'anti-rotation')
      add('core', 'Pallof press', '3×12 each side', { note: 'Anti-rotation — stability for cutting' });
    else if (workout.coreType === 'anti-extension') {
      add('core', 'Dead bug', '3×10 each side');
      add('core', 'Forearm side plank', '3×25 sec each', { note: 'Weight on forearm, not hand' });
    }
  }

  if (workout.legConditioning) {
    add('finisher', 'Wall sit', '3×45 sec');
    add('finisher', 'Single-leg RDL', 'Bodyweight · 3×10 each leg',
      { note: 'Especially valuable on quad days' });
  }

  if (workout.armConditioning) {
    add('ankle', 'Single-leg balance hold', '3×30 sec each', { note: 'Progress: eyes closed' });
    add('ankle', 'Single-leg calf raises', '3×15 each');
    add('ankle', 'Lateral band walks', '3×15 steps each direction');
  }

  if (workout.hasStairmaster) {
    add('cardio', 'Stairmaster', '15 min · 30lb vest');
  }

  return items;
}

function toggleItem(id) {
  completedItems.has(id) ? completedItems.delete(id) : completedItems.add(id);
  saveState(cachedKey);

  // Recompute which item is active
  const activeId = allItems.find(i => !completedItems.has(i.id))?.id;

  for (const item of allItems) {
    const el = document.querySelector(`[data-id="${item.id}"]`);
    if (!el) continue;
    if (completedItems.has(item.id))       el.className = 'item-card done';
    else if (item.id === activeId)         el.className = 'item-card active';
    else                                   el.className = 'item-card upcoming';
  }

  updateProgress(activeId);

  // Scroll new active into view if off-screen
  setTimeout(() => {
    const el = document.querySelector('.item-card.active');
    if (el) {
      const r = el.getBoundingClientRect();
      if (r.bottom > window.innerHeight - 20 || r.top < 70)
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, 80);
}

function updateProgress(activeId) {
  const done = allItems.filter(i => completedItems.has(i.id)).length;
  const total = allItems.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  const fill = document.getElementById('pbar-fill');
  const txt  = document.getElementById('pbar-txt');
  if (fill) fill.style.width = pct + '%';
  if (txt)  txt.textContent = `${done} / ${total}`;

  // Section completion ticks
  const groups = {};
  for (const item of allItems) {
    (groups[item.section] = groups[item.section] || []).push(item);
  }
  for (const [sec, items] of Object.entries(groups)) {
    const chk = document.querySelector(`[data-sec="${sec}"] .sec-check`);
    if (chk) chk.style.display = items.every(i => completedItems.has(i.id)) ? '' : 'none';
  }

  // Completion banner
  if (done === total && total > 0 && !document.getElementById('done-banner')) {
    const el = document.createElement('div');
    el.id = 'done-banner';
    el.className = 'done-banner';
    el.innerHTML = `<div style="font-size:48px">🎉</div>
      <div style="font-size:20px;font-weight:700;margin-top:10px;color:var(--green)">Workout Complete!</div>
      <div style="font-size:13px;color:var(--text2);margin-top:5px">Great session. Hydrate and rest well.</div>`;
    const content = document.getElementById('wcontent');
    if (content) content.insertBefore(el, content.firstChild);
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function resetProgress() {
  completedItems = new Set();
  saveState(cachedKey);
  const banner = document.getElementById('done-banner');
  if (banner) banner.remove();
  const activeId = allItems[0]?.id;
  for (const item of allItems) {
    const el = document.querySelector(`[data-id="${item.id}"]`);
    if (el) el.className = 'item-card ' + (item.id === activeId ? 'active' : 'upcoming');
  }
  updateProgress(activeId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function itemCardHTML(item, activeId) {
  const isDone = completedItems.has(item.id);
  const isActive = !isDone && item.id === activeId;
  const cls = isDone ? 'done' : isActive ? 'active' : 'upcoming';
  return `<div class="item-card ${cls}" data-id="${item.id}" onclick="toggleItem('${item.id}')">
    <div class="item-indicator"></div>
    <div class="item-body">
      <div class="item-name">${item.label}</div>
      <div class="item-meta">${item.meta}</div>
      ${item.note ? `<div class="exercise-note">${item.note}</div>` : ''}
      ${item.cap  ? `<div class="exercise-cap">Cap: <span class="cap-value">${item.cap}</span></div>` : ''}
      ${item.warn ? `<div class="exercise-warn">⚠️ ${item.warn}</div>` : ''}
    </div>
  </div>`;
}

function workoutContentHTML(workout) {
  const activeId = allItems.find(i => !completedItems.has(i.id))?.id;

  // Group into sections while preserving order
  const sections = [];
  let cur = null;
  for (const item of allItems) {
    if (!cur || cur.key !== item.section) { cur = { key: item.section, items: [] }; sections.push(cur); }
    cur.items.push(item);
  }

  let html = '';
  for (const sec of sections) {
    const allDone = sec.items.every(i => completedItems.has(i.id));
    html += `<div class="section-label" data-sec="${sec.key}">${SECTION_NAMES[sec.key] || sec.key}<span class="sec-check" style="${allDone ? '' : 'display:none'}"> ✓</span></div>`;
    html += sec.items.map(item => itemCardHTML(item, activeId)).join('');
  }

  html += `<div class="section-label">Principles</div>
    <div class="principles-card">
      <div class="principle">Increase weight before reps — add 2.5kg when 12 reps feels easy</div>
      <div class="principle">Rest 60–90s isolation · 2 min compounds</div>
      ${workout.hasCore ? '<div class="principle">Side lateral raises non-negotiable — form over weight, always</div>' : ''}
      <div class="principle">Hanging raises: no twisting variants — oblique growth widens waist</div>
      <div class="principle">No shrugs · no weighted side bends · no heavy deadlifts</div>
    </div>
    <div style="text-align:center;padding:24px 0 40px">
      <button onclick="resetProgress()" style="background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:8px 20px;opacity:0.55">Reset progress</button>
    </div>`;

  return html;
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDate(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-AU', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

function getWeekType(type, key) {
  if (['chest', 'legs-quads', 'arms-biceps'].includes(type)) return 'Front Week';
  if (['back', 'legs-hamstrings', 'arms-triceps'].includes(type)) return 'Back Week';
  if (type === 'shoulders' && key) {
    // Anchor: week starting Mon May 25, 2026 = Back Week = week 0
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const dow = date.getDay();
    const toMon = dow === 0 ? -6 : 1 - dow;
    const weekMon = new Date(y, m - 1, d + toMon);
    const anchor = new Date(2026, 4, 25);
    const weekNum = Math.round((weekMon - anchor) / 604800000);
    return weekNum % 2 === 0 ? 'Back Week' : 'Front Week';
  }
  return '';
}

            <div class="rugby-sub">Dynamic warm-up BEFORE game: leg swings · high knees · butt kicks · walking lunges with torso rotation</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const workout = WORKOUTS[entry.type]?.[entry.variation];
  if (!workout) return;

  // Build item list and load persisted state
  cachedKey = key;
  allItems = buildItemList(workout);
  completedItems = loadState(key);

  const done  = allItems.filter(i => completedItems.has(i.id)).length;
  const total = allItems.length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;

  app.innerHTML = `
    <header>
      <div class="app-name">Dashboard</div>
      <div class="date-label">${dateStr}</div>
      <div class="workout-title">${workout.title}</div>
      <div class="badge-row">
        <span class="badge accent">Variation ${entry.variation}</span>
        <span class="badge">${getWeekType(entry.type, key)}</span>
      </div>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="pbar-fill" style="width:${pct}%"></div></div>
        <div class="progress-text" id="pbar-txt">${done} / ${total}</div>
      </div>
    </header>
    <div id="wcontent" class="content">
      ${workoutContentHTML(workout)}
    </div>`;
}

render();
</script>
</body>
</html>
